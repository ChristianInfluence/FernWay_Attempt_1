<!doctype html>
<!-- Document type: tells the browser this is an HTML5 document -->
<html lang="en">
  <head>
    <!-- Character encoding for the document -->
    <meta charset="utf-8" />
    <!-- Ensure responsive layout on mobile devices -->
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <!-- Page title shown in browser tabs and when bookmarking -->
    <title>FernWay - Map App Prototype</title>
    <!-- Link to the PWA manifest (defines how the app is installed) -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Link to the app stylesheet -->
    <link rel="stylesheet" href="/styles.css" />
    <!-- MapLibre renders a seamless vector map in a WebGL canvas. -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css"
    />
    <script
      src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"
    ></script>
    <!-- Main application JavaScript (deferred until parsing completes) -->
    <script src="/app.js" defer></script>
  </head>
  <body>
    <div id="loadingOverlay">
      <video id="loadingVideo" autoplay muted playsinline preload="auto">
        <source src="/FernWay.mp4" type="video/mp4">
      </video>
    </div>

    <div id="map"></div>

    <header class="appHeader">
      <a class="brand" href="/" aria-label="FernWay home">
        <span class="brandMark" aria-hidden="true">F</span>
        <span>
          <strong>FernWay</strong>
          <small>Explore what’s around you</small>
        </span>
      </a>
    </header>

    <div id="locationStatus" role="status" aria-live="polite">
      <span class="statusDot" aria-hidden="true"></span>
      <span class="statusText">Requesting your location…</span>
    </div>

    <div id="menuOverlay">
      <div class="menuContent">
        <button id="closeMenuBtn" class="iconButton closeButton" type="button" aria-label="Close welcome panel">×</button>
        <p class="eyebrow">Welcome to FernWay</p>
        <h1>Your world,<br><span>one path away.</span></h1>
        <p class="menuIntro">See where you are, discover what’s nearby, and keep your bearings while you move.</p>
        <div class="menuActions">
          <button id="centerLocationBtn" class="primaryButton" type="button">
            <span class="buttonIcon" aria-hidden="true">◎</span>
            Center on my location
          </button>
          <button id="toggleOverlayBtn" class="secondaryButton" type="button">Drop a map marker</button>
        </div>
        <p class="privacyNote">Your location stays in this browser session.</p>
      </div>
    </div>

    <noscript>
      <div class="noscript">JavaScript is required to run this app.</div>
    </noscript>
  </body>
</html>
