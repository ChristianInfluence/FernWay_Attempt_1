<!doctype html>
<!-- Document type: tells the browser this is an HTML5 document -->
<html lang="en">
  <head>
    <!-- Character encoding for the document -->
    <meta charset="utf-8" />
    <!-- Ensure responsive layout on mobile devices -->
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <!-- Page title shown in browser tabs and when bookmarking -->
    <title>FernWay - Map App Prototype</title>
    <!-- Link to the PWA manifest (defines how the app is installed) -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Link to the app stylesheet -->
    <link rel="stylesheet" href="/styles.css" />
    <!-- MapLibre renders a seamless vector map in a WebGL canvas. -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css"
    />
    <script
      src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"
    ></script>
    <!-- Main application JavaScript (deferred until parsing completes) -->
    <script src="/app.js" defer></script>
  </head>
  <body>
    <div id="loadingOverlay" role="button" tabindex="0" aria-label="Skip intro animation">
      <video id="loadingVideo" autoplay muted playsinline preload="auto">
        <source src="/FernWay.mp4" type="video/mp4">
      </video>
      <span class="skipIntro">Click anywhere to skip</span>
    </div>

    <div id="map"></div>

    <button id="mapLocationBtn" class="mapLocationButton" type="button" aria-label="Center map on my location" title="Center on my location">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path>
      </svg>
    </button>

    <aside id="achievementRail" class="achievementRail" aria-label="Achievement categories">
      <p class="achievementRailTitle">Nearby achievements</p>
      <div id="achievementRailButtons" class="achievementRailButtons"></div>
    </aside>

    <section id="achievementMapCard" class="achievementMapCard" aria-live="polite">
      <button id="closeAchievementCard" class="achievementCardClose" type="button" aria-label="Close achievement details">×</button>
      <p id="achievementCardEyebrow" class="achievementCardEyebrow">Achievement area</p>
      <h2 id="achievementCardTitle">Choose a category</h2>
      <p id="achievementCardDescription">Select an icon to reveal nearby places where you can work toward badges.</p>
      <div class="achievementCardProgress">
        <span id="achievementCardDiamond" class="achievementCardDiamond">◆</span>
        <span id="achievementCardProgressText">Progress will appear here</span>
      </div>
    </section>

    <header class="appHeader">
      <a class="brand" href="/" aria-label="FernWay home">
        <span class="brandLogoFrame" aria-hidden="true">
          <img class="brandLogo" src="/assets/fernway-logo.png" alt="">
        </span>
        <span>
          <strong>FernWay</strong>
          <small>Explore what’s around you</small>
        </span>
      </a>
    </header>

    <div id="locationStatus" role="status" aria-live="polite">
      <span class="statusDot" aria-hidden="true"></span>
      <span class="statusText">Requesting your location…</span>
    </div>

    <div id="menuOverlay" aria-label="FernWay main menu">
      <div class="radialMenu">
        <div class="modeOrbit" aria-hidden="true"></div>

        <!-- IMAGE REFERENCE: assets/ui/main-player-settings.png — JPEG / PNG TO FOLLOW -->
        <button
          id="mainSettingsBtn"
          class="radialButton primaryRadialButton"
          type="button"
          aria-label="Player and main settings"
          data-image-ref="JPEG / PNG TO FOLLOW: simplified Vitruvian Man"
        >
          <img class="vitruvianArtwork" src="/assets/vitruvian-man.png" alt="">
          <span class="radialLabel">Player</span>
        </button>

        <div id="playerQuickMenu" class="playerQuickMenu" aria-label="Player quick menu">
          <!-- IMAGE REFERENCE: assets/ui/player-exit.png — JPEG / PNG TO FOLLOW -->
          <button id="playerExitBtn" class="playerMiniButton playerExitButton" type="button" aria-label="Exit player menu">
            <svg viewBox="0 0 48 48" aria-hidden="true">
              <path d="M13 13l22 22M35 13L13 35"></path>
            </svg>
            <span>Exit</span>
          </button>

          <!-- IMAGE REFERENCE: assets/ui/player-settings.png — JPEG / PNG TO FOLLOW -->
          <button id="playerSettingsBtn" class="playerMiniButton playerSettingsButton" type="button" aria-label="Player settings">
            <svg viewBox="0 0 48 48" aria-hidden="true">
              <circle cx="24" cy="24" r="7"></circle>
              <path d="M24 6v6M24 36v6M6 24h6M36 24h6M11 11l5 5M32 32l5 5M37 11l-5 5M16 32l-5 5"></path>
              <circle cx="24" cy="24" r="15"></circle>
            </svg>
            <span>Settings</span>
          </button>

          <div class="playerActionTrack" aria-label="Player actions">
            <!-- IMAGE REFERENCE: assets/ui/player-inventory.png — JPEG / PNG TO FOLLOW -->
            <button class="playerActionButton inventoryAction" type="button" data-player-action="Inventory" aria-label="Inventory">
              <svg viewBox="0 0 56 56" aria-hidden="true">
                <path d="M17 18h22l5 30H12l5-30z"></path>
                <path d="M21 18c0-8 14-8 14 0M19 29h18M28 29v13"></path>
              </svg>
              <span>Inventory</span>
            </button>

            <!-- IMAGE REFERENCE: assets/ui/player-messages.png — JPEG / PNG TO FOLLOW -->
            <button class="playerActionButton messagesAction" type="button" data-player-action="Messages" aria-label="Messages">
              <svg viewBox="0 0 56 56" aria-hidden="true">
                <path d="M9 12h38v29H25L14 49v-8H9V12z"></path>
                <path d="M17 23h22M17 31h15"></path>
              </svg>
              <span>Messages</span>
            </button>

            <!-- IMAGE REFERENCE: assets/ui/player-self-care.png — JPEG / PNG TO FOLLOW -->
            <button class="playerActionButton selfCareAction" type="button" data-player-action="Self-Care" aria-label="Self-care">
              <svg viewBox="0 0 56 56" aria-hidden="true">
                <circle cx="28" cy="28" r="21"></circle>
                <path d="M28 17v22M17 28h22"></path>
              </svg>
              <span>Self-Care</span>
            </button>

            <!-- IMAGE REFERENCE: assets/ui/player-rank-clan.png — JPEG / PNG TO FOLLOW -->
            <button class="playerActionButton rankClanAction" type="button" data-player-action="Rank / Clan" aria-label="Rank and clan">
              <svg viewBox="0 0 56 56" aria-hidden="true">
                <path d="M28 7l8 8 11 2-5 10 1 12-11-2-10 7-5-11-9-7 8-9 3-10z"></path>
                <path d="M22 24h12M28 18v18"></path>
              </svg>
              <span>Rank / Clan</span>
            </button>
          </div>
          <p id="playerMenuStatus" class="playerMenuStatus" aria-live="polite">Player menu</p>
        </div>

        <!-- IMAGE REFERENCE: assets/ui/map-compass.png — JPEG / PNG TO FOLLOW -->
        <button
          id="mapModeBtn"
          class="radialButton modeButton mapModeButton"
          type="button"
          aria-label="Open map"
          data-image-ref="JPEG / PNG TO FOLLOW: simplified compass rose"
        >
          <svg class="nauticalCompassIcon" viewBox="0 0 72 72" aria-hidden="true">
            <circle class="compassOuterRing" cx="36" cy="36" r="30"></circle>
            <circle class="compassInnerRing" cx="36" cy="36" r="23"></circle>
            <path class="compassStar" d="M36 8l6 20 22 8-22 8-6 20-6-20-22-8 22-8 6-20z"></path>
            <path class="compassNeedleNorth" d="M36 13l6 23-6 6-6-6 6-23z"></path>
            <path class="compassNeedleSouth" d="M36 59l-6-23 6-6 6 6-6 23z"></path>
            <circle class="compassHub" cx="36" cy="36" r="4"></circle>
            <path class="compassTicks" d="M36 4v5M36 63v5M4 36h5M63 36h5M14 14l4 4M54 54l4 4M58 14l-4 4M18 54l-4 4"></path>
            <text x="36" y="12" text-anchor="middle">N</text>
            <text x="61" y="39" text-anchor="middle">E</text>
            <text x="36" y="65" text-anchor="middle">S</text>
            <text x="11" y="39" text-anchor="middle">W</text>
          </svg>
          <span class="radialLabel">Map</span>
        </button>

        <!-- IMAGE REFERENCE: assets/ui/story-book.png — JPEG / PNG TO FOLLOW -->
        <button
          id="storyModeBtn"
          class="radialButton modeButton storyModeButton"
          type="button"
          aria-label="Open story mode"
          data-image-ref="JPEG / PNG TO FOLLOW: simplified open book"
        >
          <svg class="storyBookIcon" viewBox="0 0 72 72" aria-hidden="true">
            <path class="bookCover" d="M7 20c10-4 20-2 29 6 9-8 19-10 29-6v38c-10-3-20-1-29 7-9-8-19-10-29-7V20z"></path>
            <path class="bookPages" d="M11 16c9-2 17 1 25 8 8-7 16-10 25-8v37c-9-2-17 1-25 8-8-7-16-10-25-8V16z"></path>
            <path class="bookBinding" d="M36 24v37"></path>
            <path class="bookLines" d="M17 29c5 0 10 2 14 5M17 38c5 0 10 2 14 5M55 29c-5 0-10 2-14 5M55 38c-5 0-10 2-14 5"></path>
            <path class="bookFlourish" d="M36 16c1-5 4-8 8-9-1 4 0 6 3 8-5 0-8 2-11 6-3-4-6-6-11-6 3-2 4-4 3-8 4 1 7 4 8 9z"></path>
            <circle class="bookSpark" cx="18" cy="11" r="2"></circle>
            <circle class="bookSpark" cx="55" cy="10" r="1.5"></circle>
          </svg>
          <span class="radialLabel">Story</span>
        </button>

        <!-- EIGHT ACHIEVEMENT SPOKES: Flame begins at twelve o'clock, then categories continue clockwise. -->
        <span class="connectorSpoke" style="--angle: 0deg; --accent: #ff704f" aria-hidden="true"></span>
        <span class="connectorSpoke" style="--angle: 45deg; --accent: #f2a8ff" aria-hidden="true"></span>
        <span class="connectorSpoke" style="--angle: 90deg; --accent: #69db83" aria-hidden="true"></span>
        <span class="connectorSpoke" style="--angle: 135deg; --accent: #79b7ff" aria-hidden="true"></span>
        <span class="connectorSpoke" style="--angle: 180deg; --accent: #f5b85c" aria-hidden="true"></span>
        <span class="connectorSpoke" style="--angle: 225deg; --accent: #e8d98c" aria-hidden="true"></span>
        <span class="connectorSpoke" style="--angle: 270deg; --accent: #73dfdf" aria-hidden="true"></span>
        <span class="connectorSpoke" style="--angle: 315deg; --accent: #c9a9ff" aria-hidden="true"></span>

        <!-- IMAGE REFERENCE: assets/ui/achievement-flames.png — JPEG / PNG TO FOLLOW -->
        <button class="radialButton utilityButton spokePrimary achievementButton" style="--angle: 0deg; --accent: #ff704f" type="button" aria-label="Flame achievements" data-category="flames" data-action-label="Flame achievements" data-image-ref="JPEG / PNG TO FOLLOW: flames">
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M35 6c3 11-7 13-4 24 3-4 7-7 8-13 9 8 14 17 11 27-3 10-11 15-20 15S12 53 12 42c0-9 6-17 14-25-1 9 2 13 5 15-1-9 8-14 4-26z"></path>
            <path class="iconDetail" d="M34 35c5 5 7 9 5 14-1 4-4 6-8 6-5 0-8-4-8-8 0-5 4-9 8-13 0 5 1 7 3 8-1-3-1-5 0-7z"></path>
          </svg>
          <span class="achievementLabel">Flames</span>
        </button>

        <!-- IMAGE REFERENCE: assets/ui/achievement-palettes.png — JPEG / PNG TO FOLLOW -->
        <button class="radialButton utilityButton spokePrimary achievementButton" style="--angle: 45deg; --accent: #f2a8ff" type="button" aria-label="Palette achievements" data-category="palettes" data-action-label="Palette achievements" data-image-ref="JPEG / PNG TO FOLLOW: palettes">
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M32 8C18 8 7 18 7 31c0 12 9 23 22 24 5 0 8-3 6-7-1-3 1-6 5-6h5c8 0 13-6 12-13C55 16 45 8 32 8z"></path>
            <circle class="iconDetail" cx="20" cy="25" r="3"></circle>
            <circle class="iconDetail" cx="29" cy="18" r="3"></circle>
            <circle class="iconDetail" cx="40" cy="20" r="3"></circle>
            <circle class="iconDetail" cx="47" cy="29" r="3"></circle>
          </svg>
          <span class="achievementLabel">Palettes</span>
        </button>

        <!-- IMAGE REFERENCE: assets/ui/achievement-vines.png — JPEG / PNG TO FOLLOW -->
        <button class="radialButton utilityButton spokePrimary achievementButton" style="--angle: 90deg; --accent: #69db83" type="button" aria-label="Vine achievements" data-category="vines" data-action-label="Vine achievements" data-image-ref="JPEG / PNG TO FOLLOW: vines">
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M18 57c21-12 27-29 24-49M28 43c-10 1-15-5-15-13 9-1 15 4 15 13zM39 28c10 0 15-6 14-15-9 0-15 6-14 15zM24 51c-8 0-12-4-12-10 7-1 12 3 12 10z"></path>
          </svg>
          <span class="achievementLabel">Vines</span>
        </button>

        <!-- IMAGE REFERENCE: assets/ui/achievement-locks.png — JPEG / PNG TO FOLLOW -->
        <button class="radialButton utilityButton spokePrimary achievementButton" style="--angle: 135deg; --accent: #79b7ff" type="button" aria-label="Lock achievements" data-category="locks" data-action-label="Lock achievements" data-image-ref="JPEG / PNG TO FOLLOW: locks">
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <rect x="13" y="27" width="38" height="29" rx="7"></rect>
            <path d="M21 27v-8c0-8 5-13 11-13s11 5 11 13v8"></path>
            <path class="iconDetail" d="M32 38v8M28 38a4 4 0 1 1 8 0"></path>
          </svg>
          <span class="achievementLabel">Locks</span>
        </button>

        <!-- IMAGE REFERENCE: assets/ui/achievement-hammers.png — JPEG / PNG TO FOLLOW -->
        <button class="radialButton utilityButton spokePrimary achievementButton" style="--angle: 180deg; --accent: #f5b85c" type="button" aria-label="Hammer achievements" data-category="hammers" data-action-label="Hammer achievements" data-image-ref="JPEG / PNG TO FOLLOW: hammers">
          <svg class="woodenMalletIcon" viewBox="0 0 64 64" aria-hidden="true">
            <path class="malletHead" d="M7 12l37-5 5 20-37 5z"></path>
            <path class="malletEnd" d="M44 7l9 4 4 15-8 1z"></path>
            <path class="malletHandle" d="M28 28l9-1 7 30-10 2z"></path>
            <path class="malletWedge" d="M25 11l8-1 2 18-8 1z"></path>
            <path class="malletGrain" d="M13 18c7-3 14 3 23-2M15 25c8-3 15 1 24-3M35 34l4 17M32 41l8 5"></path>
            <circle class="malletKnot" cx="20" cy="21" r="3"></circle>
          </svg>
          <span class="achievementLabel">Hammers</span>
        </button>

        <!-- IMAGE REFERENCE: assets/ui/achievement-scales.png — JPEG / PNG TO FOLLOW -->
        <button class="radialButton utilityButton spokePrimary achievementButton" style="--angle: 225deg; --accent: #e8d98c" type="button" aria-label="Scales of justice achievements" data-category="scales" data-action-label="Scales achievements" data-image-ref="JPEG / PNG TO FOLLOW: scales of justice">
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M32 8v44M19 55h26M14 18h36M32 12l-18 6M32 12l18 6"></path>
            <path d="M14 18L7 35h14L14 18zM50 18l-7 17h14l-7-17z"></path>
            <path class="iconDetail" d="M7 35c1 6 13 6 14 0M43 35c1 6 13 6 14 0"></path>
          </svg>
          <span class="achievementLabel">Scales</span>
        </button>

        <!-- IMAGE REFERENCE: assets/ui/achievement-vials.png — JPEG / PNG TO FOLLOW -->
        <button class="radialButton utilityButton spokePrimary achievementButton" style="--angle: 270deg; --accent: #73dfdf" type="button" aria-label="Vial achievements" data-category="vials" data-action-label="Vial achievements" data-image-ref="JPEG / PNG TO FOLLOW: vials">
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M23 8h18M27 8v15L14 48c-3 6 1 9 7 9h22c6 0 10-3 7-9L37 23V8"></path>
            <path class="iconDetail" d="M20 43h24M23 37c6 3 12-3 18 0"></path>
            <circle class="iconDetail" cx="29" cy="47" r="2"></circle>
            <circle class="iconDetail" cx="38" cy="51" r="2"></circle>
          </svg>
          <span class="achievementLabel">Vials</span>
        </button>

        <!-- IMAGE REFERENCE: assets/ui/achievement-scrolls.png — JPEG / PNG TO FOLLOW -->
        <button class="radialButton utilityButton spokePrimary achievementButton" style="--angle: 315deg; --accent: #c9a9ff" type="button" aria-label="Scroll achievements" data-category="scrolls" data-action-label="Scroll achievements" data-image-ref="JPEG / PNG TO FOLLOW: scrolls">
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M17 10h31c5 0 8 4 8 9s-3 9-8 9V54H19V20c0-6-3-10-8-10z"></path>
            <path d="M17 10c5 0 8 4 8 9s-3 9-8 9H8c0-5 3-9 8-9M27 34h14M27 42h14"></path>
          </svg>
          <span class="achievementLabel">Scrolls</span>
        </button>

        <!-- SMALL SATELLITE IMAGE REFERENCES: assets/ui/achievement-rank-01.png through achievement-rank-08.png — JPEG / PNG TO FOLLOW -->
        <button class="radialButton utilityButton satelliteButton" style="--angle: 0deg; --accent: #ff704f" type="button" aria-label="Flame achievement rank" data-action-label="Flame rank" data-image-ref="JPEG / PNG TO FOLLOW: flame rank"><span aria-hidden="true">◆</span></button>
        <button class="radialButton utilityButton satelliteButton" style="--angle: 45deg; --accent: #f2a8ff" type="button" aria-label="Palette achievement rank" data-action-label="Palette rank" data-image-ref="JPEG / PNG TO FOLLOW: palette rank"><span aria-hidden="true">◆</span></button>
        <button class="radialButton utilityButton satelliteButton" style="--angle: 90deg; --accent: #69db83" type="button" aria-label="Vine achievement rank" data-action-label="Vine rank" data-image-ref="JPEG / PNG TO FOLLOW: vine rank"><span aria-hidden="true">◆</span></button>
        <button class="radialButton utilityButton satelliteButton" style="--angle: 135deg; --accent: #79b7ff" type="button" aria-label="Lock achievement rank" data-action-label="Lock rank" data-image-ref="JPEG / PNG TO FOLLOW: lock rank"><span aria-hidden="true">◆</span></button>
        <button class="radialButton utilityButton satelliteButton" style="--angle: 180deg; --accent: #f5b85c" type="button" aria-label="Hammer achievement rank" data-action-label="Hammer rank" data-image-ref="JPEG / PNG TO FOLLOW: hammer rank"><span aria-hidden="true">◆</span></button>
        <button class="radialButton utilityButton satelliteButton" style="--angle: 225deg; --accent: #e8d98c" type="button" aria-label="Scales achievement rank" data-action-label="Scales rank" data-image-ref="JPEG / PNG TO FOLLOW: scales rank"><span aria-hidden="true">◆</span></button>
        <button class="radialButton utilityButton satelliteButton" style="--angle: 270deg; --accent: #73dfdf" type="button" aria-label="Vial achievement rank" data-action-label="Vial rank" data-image-ref="JPEG / PNG TO FOLLOW: vial rank"><span aria-hidden="true">◆</span></button>
        <button class="radialButton utilityButton satelliteButton" style="--angle: 315deg; --accent: #c9a9ff" type="button" aria-label="Scroll achievement rank" data-action-label="Scroll rank" data-image-ref="JPEG / PNG TO FOLLOW: scroll rank"><span aria-hidden="true">◆</span></button>

        <p id="radialMessage" class="radialMessage" aria-live="polite">Choose your path</p>
      </div>
    </div>

    <noscript>
      <div class="noscript">JavaScript is required to run this app.</div>
    </noscript>
  </body>
</html>
