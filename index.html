<!doctype html>
<!-- Document type: tells the browser this is an HTML5 document -->
<html lang="en">
  <head>
    <!-- Character encoding for the document -->
    <meta charset="utf-8" />
    <!-- Ensure responsive layout on mobile devices -->
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <!-- Page title shown in browser tabs and when bookmarking -->
    <title>FernWay - Map App Prototype</title>
    <!-- Link to the PWA manifest (defines how the app is installed) -->
    <link rel="manifest" href="/manifest.json" />
    <!-- Link to the app stylesheet -->
    <link rel="stylesheet" href="/styles.css" />
    <!-- MapLibre renders a seamless vector map in a WebGL canvas. -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css"
    />
    <script
      src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"
    ></script>
    <!-- Main application JavaScript (deferred until parsing completes) -->
    <script src="/app.js" defer></script>
  </head>
  <body>
    <div id="loadingOverlay" role="button" tabindex="0" aria-label="Skip intro animation">
      <video id="loadingVideo" autoplay muted playsinline preload="auto">
        <source src="/FernWay.mp4" type="video/mp4">
      </video>
      <span class="skipIntro">Click anywhere to skip</span>
    </div>

    <div id="map"></div>

    <button id="mapLocationBtn" class="mapLocationButton" type="button" aria-label="Center map on my location" title="Center on my location">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path>
      </svg>
    </button>

    <header class="appHeader">
      <a class="brand" href="/" aria-label="FernWay home">
        <span class="brandLogoFrame" aria-hidden="true">
          <img class="brandLogo" src="/assets/fernway-logo.png" alt="">
        </span>
        <span>
          <strong>FernWay</strong>
          <small>Explore what’s around you</small>
        </span>
      </a>
    </header>

    <div id="locationStatus" role="status" aria-live="polite">
      <span class="statusDot" aria-hidden="true"></span>
      <span class="statusText">Requesting your location…</span>
    </div>

    <div id="menuOverlay" aria-label="FernWay main menu">
      <div class="radialMenu">
        <div class="modeOrbit" aria-hidden="true"></div>

        <!-- IMAGE REFERENCE: assets/ui/main-player-settings.png — JPEG / PNG TO FOLLOW -->
        <button
          id="mainSettingsBtn"
          class="radialButton primaryRadialButton"
          type="button"
          aria-label="Player and main settings"
          data-image-ref="JPEG / PNG TO FOLLOW: simplified Vitruvian Man"
        >
          <svg class="vitruvianIcon" viewBox="0 0 64 64" aria-hidden="true">
            <circle cx="32" cy="13" r="5"></circle>
            <circle cx="32" cy="32" r="25"></circle>
            <path d="M32 19v22M17 25l15 8 15-8M19 43l13-11 13 11M24 24l8 17 8-17"></path>
          </svg>
          <span class="radialLabel">Player</span>
        </button>

        <!-- IMAGE REFERENCE: assets/ui/map-compass.png — JPEG / PNG TO FOLLOW -->
        <button
          id="mapModeBtn"
          class="radialButton modeButton mapModeButton"
          type="button"
          aria-label="Open map"
          data-image-ref="JPEG / PNG TO FOLLOW: simplified compass rose"
        >
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <circle cx="32" cy="32" r="25"></circle>
            <path d="M41 23l-6 12-12 6 6-12 12-6z"></path>
            <path d="M32 4v7M32 53v7M4 32h7M53 32h7"></path>
          </svg>
          <span class="radialLabel">Map</span>
        </button>

        <!-- IMAGE REFERENCE: assets/ui/story-book.png — JPEG / PNG TO FOLLOW -->
        <button
          id="storyModeBtn"
          class="radialButton modeButton storyModeButton"
          type="button"
          aria-label="Open story mode"
          data-image-ref="JPEG / PNG TO FOLLOW: simplified open book"
        >
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M8 15c9-2 17 0 24 6v31c-7-6-15-8-24-6V15zM56 15c-9-2-17 0-24 6v31c7-6 15-8 24-6V15z"></path>
            <path d="M15 24c4 0 8 1 11 3M15 32c4 0 8 1 11 3M49 24c-4 0-8 1-11 3M49 32c-4 0-8 1-11 3"></path>
          </svg>
          <span class="radialLabel">Story</span>
        </button>

        <!-- EIGHT CONNECTING SPOKES: offset 22.5 degrees so Map and Story retain their clear 45-degree axis. -->
        <span class="connectorSpoke" style="--angle: 22.5deg" aria-hidden="true"></span>
        <span class="connectorSpoke" style="--angle: 67.5deg" aria-hidden="true"></span>
        <span class="connectorSpoke" style="--angle: 112.5deg" aria-hidden="true"></span>
        <span class="connectorSpoke" style="--angle: 157.5deg" aria-hidden="true"></span>
        <span class="connectorSpoke" style="--angle: 202.5deg" aria-hidden="true"></span>
        <span class="connectorSpoke" style="--angle: 247.5deg" aria-hidden="true"></span>
        <span class="connectorSpoke" style="--angle: 292.5deg" aria-hidden="true"></span>
        <span class="connectorSpoke" style="--angle: 337.5deg" aria-hidden="true"></span>

        <!-- PRIMARY SPOKE IMAGE REFERENCES: assets/ui/action-01.png through action-08.png — JPEG / PNG TO FOLLOW -->
        <button class="radialButton utilityButton spokePrimary" style="--angle: 22.5deg" type="button" aria-label="Profile" data-action-label="Profile" data-image-ref="JPEG / PNG TO FOLLOW: profile"><span aria-hidden="true">◉</span></button>
        <button class="radialButton utilityButton spokePrimary" style="--angle: 67.5deg" type="button" aria-label="Journal" data-action-label="Journal" data-image-ref="JPEG / PNG TO FOLLOW: journal"><span aria-hidden="true">✦</span></button>
        <button class="radialButton utilityButton spokePrimary" style="--angle: 112.5deg" type="button" aria-label="Inventory" data-action-label="Inventory" data-image-ref="JPEG / PNG TO FOLLOW: inventory"><span aria-hidden="true">◇</span></button>
        <button class="radialButton utilityButton spokePrimary" style="--angle: 157.5deg" type="button" aria-label="Community" data-action-label="Community" data-image-ref="JPEG / PNG TO FOLLOW: community"><span aria-hidden="true">◌</span></button>
        <button class="radialButton utilityButton spokePrimary" style="--angle: 202.5deg" type="button" aria-label="Messages" data-action-label="Messages" data-image-ref="JPEG / PNG TO FOLLOW: messages"><span aria-hidden="true">▱</span></button>
        <button class="radialButton utilityButton spokePrimary" style="--angle: 247.5deg" type="button" aria-label="Achievements" data-action-label="Achievements" data-image-ref="JPEG / PNG TO FOLLOW: achievements"><span aria-hidden="true">☆</span></button>
        <button class="radialButton utilityButton spokePrimary" style="--angle: 292.5deg" type="button" aria-label="Camera" data-action-label="Camera" data-image-ref="JPEG / PNG TO FOLLOW: camera"><span aria-hidden="true">▣</span></button>
        <button class="radialButton utilityButton spokePrimary" style="--angle: 337.5deg" type="button" aria-label="Help" data-action-label="Help" data-image-ref="JPEG / PNG TO FOLLOW: help"><span aria-hidden="true">?</span></button>

        <!-- SMALL SATELLITE IMAGE REFERENCES: assets/ui/sub-action-01.png through sub-action-08.png — JPEG / PNG TO FOLLOW -->
        <button class="radialButton utilityButton satelliteButton" style="--angle: 22.5deg" type="button" aria-label="Profile status" data-action-label="Profile status" data-image-ref="JPEG / PNG TO FOLLOW: profile sub-action"><span aria-hidden="true">1</span></button>
        <button class="radialButton utilityButton satelliteButton" style="--angle: 67.5deg" type="button" aria-label="Journal note" data-action-label="Journal note" data-image-ref="JPEG / PNG TO FOLLOW: journal sub-action"><span aria-hidden="true">2</span></button>
        <button class="radialButton utilityButton satelliteButton" style="--angle: 112.5deg" type="button" aria-label="Inventory quick slot" data-action-label="Inventory quick slot" data-image-ref="JPEG / PNG TO FOLLOW: inventory sub-action"><span aria-hidden="true">3</span></button>
        <button class="radialButton utilityButton satelliteButton" style="--angle: 157.5deg" type="button" aria-label="Community alert" data-action-label="Community alert" data-image-ref="JPEG / PNG TO FOLLOW: community sub-action"><span aria-hidden="true">4</span></button>
        <button class="radialButton utilityButton satelliteButton" style="--angle: 202.5deg" type="button" aria-label="Unread messages" data-action-label="Unread messages" data-image-ref="JPEG / PNG TO FOLLOW: messages sub-action"><span aria-hidden="true">5</span></button>
        <button class="radialButton utilityButton satelliteButton" style="--angle: 247.5deg" type="button" aria-label="Achievement progress" data-action-label="Achievement progress" data-image-ref="JPEG / PNG TO FOLLOW: achievements sub-action"><span aria-hidden="true">6</span></button>
        <button class="radialButton utilityButton satelliteButton" style="--angle: 292.5deg" type="button" aria-label="Camera shortcut" data-action-label="Camera shortcut" data-image-ref="JPEG / PNG TO FOLLOW: camera sub-action"><span aria-hidden="true">7</span></button>
        <button class="radialButton utilityButton satelliteButton" style="--angle: 337.5deg" type="button" aria-label="Help alert" data-action-label="Help alert" data-image-ref="JPEG / PNG TO FOLLOW: help sub-action"><span aria-hidden="true">8</span></button>

        <p id="radialMessage" class="radialMessage" aria-live="polite">Choose your path</p>
      </div>
    </div>

    <noscript>
      <div class="noscript">JavaScript is required to run this app.</div>
    </noscript>
  </body>
</html>
